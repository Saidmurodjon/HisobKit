name: 🚀 Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes (ixtiyoriy)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  # ─── Android APK (Release + Signed) ──────────────────────────────────────────
  android:
    name: 🤖 Android APK (Release)
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Set up Flutter 3.x
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔧 Generate code (build_runner)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: 🔑 Decode release keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/hisobkit-release.keystore

      - name: 📝 Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=hisobkit-release.keystore
          EOF

      - name: 🏗️ Build Release APK
        run: flutter build apk --release

      - name: 📋 Rename APK
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/HisobKit-${VERSION}.apk

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: HisobKit-android-release
          path: build/app/outputs/flutter-apk/HisobKit-*.apk
          retention-days: 30

      - name: 🎉 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/HisobKit-*.apk
          name: "🎯 HisobKit ${{ github.ref_name }}"
          body: |
            ## 📱 HisobKit ${{ github.ref_name }}

            ${{ github.event.inputs.release_notes || 'Yangi versiya chiqdi!' }}

            ---

            ### ⬇️ O'rnatish (Android)

            1. **HisobKit-*.apk** faylini yuklab oling
            2. Telefoningizda oching
            3. *"Noma'lum manbalardan o'rnatish"* ni ruxsat bering
            4. O'rnating va ishga tushiring

            > ⚠️ Agar eskisi o'rnatilgan bo'lsa, avval uni o'chirmang — ma'lumotlar saqlanadi.

            ---

            ### 🔒 Xavfsizlik

            - ✅ AES-256 shifrlangan SQLite ma'lumotlar bazasi
            - ✅ Barmoq izi / yuz identifikatori qo'llab-quvvatlanadi
            - ✅ Internetga ulanmaydi (100% offline)
            - ✅ Hech qanday analitika yo'q

            ---

            ### 📋 Minimal talablar

            | Platforma | Talab |
            |-----------|-------|
            | Android | API 23+ (Android 6.0) |
            | iOS | 13.0+ (App Store orqali) |

          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── iOS IPA (no codesign) ────────────────────────────────────────────────────
  ios:
    name: 🍎 iOS IPA
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🐦 Set up Flutter 3.x
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔧 Generate code (build_runner)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: 🍫 Install CocoaPods
        run: |
          cd ios && pod install --repo-update && cd ..

      - name: 🏗️ Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: 📦 Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r HisobKit-${{ github.ref_name }}.ipa Payload/
          rm -rf Payload

      - name: 📤 Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: HisobKit-ios
          path: HisobKit-*.ipa

      - name: 📎 Attach IPA to Release
        uses: softprops/action-gh-release@v2
        with:
          files: HisobKit-*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Notify on failure ────────────────────────────────────────────────────────
  notify:
    name: 📬 Notify
    runs-on: ubuntu-latest
    needs: [android]
    if: failure()
    steps:
      - name: ❌ Build failed
        run: |
          echo "Build failed for ${{ github.ref_name }}"
          echo "Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
